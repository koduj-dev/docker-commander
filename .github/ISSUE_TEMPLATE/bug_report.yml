name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please **do not** report
        security vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
      placeholder: When I … I expected … but instead …
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Docker Commander version
      description: Shown in the sidebar footer or at `GET /api/version`.
      placeholder: v1.1.0
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Release binary
        - systemd service
        - Built from source
        - Other (describe below)
    validations:
      required: true
  - type: dropdown
    id: host-kind
    attributes:
      label: Which host does the bug involve?
      options:
        - Local daemon
        - Remote — SSH
        - Remote — TCP (+TLS)
        - Not host-specific
    validations:
      required: true
  - type: input
    id: docker-version
    attributes:
      label: Docker engine version
      description: From the host detail panel or `docker version`.
      placeholder: "28.5"
  - type: input
    id: os
    attributes:
      label: OS / arch of the Docker Commander host
      placeholder: Ubuntu 24.04 / amd64
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server logs (`journalctl -u dockercmd` / stderr) and any browser console errors.
      render: shell
