name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Build the embedded UI (installs web deps), run the frontend unit tests,
      # then vet/test/build the Go binary.
      - run: make ui
      - run: npm run test --prefix web
      - run: gofmt -l $(git ls-files '*.go') | tee /tmp/fmt && test ! -s /tmp/fmt
      - run: go vet ./...
      # -short skips the Docker/Redis/LDAP/SMTP integration tests: they need
      # live backends, are subject to Docker Hub rate limits on shared CI IPs,
      # and have hit a go1.25 + modernc-sqlite connection-pool stall on hosted
      # runners. They run locally via a plain `go test ./...`. The timeout is a
      # backstop so the job never hangs for the full budget.
      - run: go test -short -timeout=120s -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1   # unit coverage (informational)
      - run: go build ./...
