name: Release

# Tag a commit `vX.Y.Z` and push the tag to build cross-platform binaries, sign
# them, publish the GitHub release, and push a multi-arch container image:
#   git tag v1.0.0 && git push origin v1.0.0
#
# Third-party actions are pinned by commit SHA (with a human-readable version in
# the trailing comment) so a moved tag can't swap in malicious code on a run that
# holds id-token / attestations / packages write.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release + upload assets
      id-token: write # keyless cosign signing of the checksums
      attestations: write # build-provenance attestations for the binaries
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Cross-compile linux/macos/windows (amd64+arm64) with the tag stamped in,
      # producing dist-bin/<binary>-<os>-<arch>[.exe] and SHA256SUMS.
      - name: Build release binaries
        run: VERSION="${GITHUB_REF_NAME}" make release

      # Source SBOM (SPDX) shipped alongside the binaries. upload-release-assets
      # is off: the release is created below and already collects dist-bin/*.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist-bin/dockercmd.sbom.spdx.json
          upload-release-assets: false

      # Cover the SBOM with the signed checksums too, so every published asset
      # (binaries + SBOM) has integrity backed by the cosign signature below.
      - name: Add SBOM to the checksums
        run: (cd dist-bin && sha256sum dockercmd.sbom.spdx.json >> SHA256SUMS)

      # Keyless-sign the checksums file (it covers every binary + the SBOM).
      # Verify with:
      #   cosign verify-blob --certificate SHA256SUMS.pem --signature SHA256SUMS.sig \
      #     --certificate-identity-regexp '^https://github\.com/koduj-dev/docker-commander/\.github/workflows/release\.yml@refs/tags/v' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com SHA256SUMS
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign SHA256SUMS
        run: |
          cosign sign-blob --yes dist-bin/SHA256SUMS \
            --output-signature dist-bin/SHA256SUMS.sig \
            --output-certificate dist-bin/SHA256SUMS.pem

      # Tamper-evident build provenance per binary. Verify with:
      #   gh attestation verify <file> --repo koduj-dev/docker-commander
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "dist-bin/dockercmd-*"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist-bin/* --title "${GITHUB_REF_NAME}" --generate-notes

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
      id-token: write # keyless cosign signing of the image
      attestations: write # provenance attestation for the image
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest` is left to the default flavor (latest=auto): it's applied
          # only to stable semver tags, so a pre-release like v1.5.0-rc1 won't
          # advance `latest`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          provenance: true # SLSA provenance attestation on the image
          sbom: true # SBOM attestation on the image

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign the image
        # -r signs the index AND each per-platform child manifest.
        run: cosign sign --yes -r "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"

  homebrew:
    needs: release # the release (and its SHA256SUMS) must exist first
    runs-on: ubuntu-latest
    env:
      # Cross-repo push needs a PAT with contents:write on koduj-dev/homebrew-tap
      # (the default GITHUB_TOKEN can't reach another repo). If the secret isn't
      # set the bump step is skipped — the formula can be updated by hand until then.
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Bump the Homebrew tap formula
        if: ${{ env.TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"
          gh release download "$VERSION" -p SHA256SUMS -D /tmp
          sha() { awk -v f="dockercmd-$1" '$2==f {print $1}' /tmp/SHA256SUMS; }
          tap="$(mktemp -d)"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/koduj-dev/homebrew-tap.git" "$tap"
          mkdir -p "$tap/Formula"
          sed -e "s/__VERSION__/${ver}/g" \
              -e "s/__SHA_DARWIN_AMD64__/$(sha darwin-amd64)/g" \
              -e "s/__SHA_DARWIN_ARM64__/$(sha darwin-arm64)/g" \
              -e "s/__SHA_LINUX_AMD64__/$(sha linux-amd64)/g" \
              -e "s/__SHA_LINUX_ARM64__/$(sha linux-arm64)/g" \
              deploy/homebrew/dockercmd.rb.tmpl > "$tap/Formula/dockercmd.rb"
          cd "$tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/dockercmd.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
            exit 0
          fi
          git commit -m "dockercmd ${ver}"
          git push

  packages:
    needs: release # reuse the release's already-built, signed linux binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the .deb / .rpm to the release
      id-token: write # build-provenance attestation for the packages
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build .deb and .rpm (amd64 + arm64)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
          mkdir -p dist-bin out
          gh release download "$VERSION" -p 'dockercmd-linux-amd64' -p 'dockercmd-linux-arm64' -p SHA256SUMS -D dist-bin
          # Verify the binaries against the signed checksums before packaging them.
          (cd dist-bin && sha256sum -c SHA256SUMS --ignore-missing)
          test -f dist-bin/dockercmd-linux-amd64 && test -f dist-bin/dockercmd-linux-arm64
          # Packaged unit points at /usr/bin (Debian policy keeps packages out of /usr/local).
          sed 's|/usr/local/bin/dockercmd|/usr/bin/dockercmd|' deploy/dockercmd.service > deploy/packaging/dockercmd.service
          for arch in amd64 arm64; do
            rendered="$(mktemp)"
            sed -e "s/\${ARCH}/${arch}/g" -e "s/\${VERSION}/${ver}/g" deploy/nfpm.yaml > "$rendered"
            nfpm pkg -p deb -f "$rendered" -t out/
            nfpm pkg -p rpm -f "$rendered" -t out/
          done
          ls -la out
          gh release upload "$VERSION" out/* --clobber

      # Tamper-evident provenance for the packages (verify with
      # `gh attestation verify <pkg> --repo koduj-dev/docker-commander`).
      - name: Attest package provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "out/*"
