name: {{.Slug}}

services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "{{.HttpPort}}:80"
    volumes:
      - ./app:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
  php:
    image: php:8.3-fpm-alpine
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "{{.MysqlDatabase}}"
      MYSQL_ROOT_PASSWORD: "{{.MysqlRootPassword}}"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata:
